<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Inbox — Framer Webhook Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ===================================================================
       Reset & Base
       =================================================================== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f8f8f6;
      --surface: #ffffff;
      --border: #e4e4e0;
      --border-hover: #d0d0cc;
      --text: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-tertiary: #999999;
      --accent: #1a1a1a;
      --accent-light: #f0f0ee;
      --green: #22c55e;
      --green-bg: #f0fdf4;
      --red: #ef4444;
      --red-bg: #fef2f2;
      --blue: #3b82f6;
      --radius: 10px;
      --radius-sm: 6px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-lg: 0 4px 12px rgba(0,0,0,0.08);
      --font-body: 'DM Sans', -apple-system, sans-serif;
      --font-mono: 'DM Mono', 'SF Mono', monospace;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ===================================================================
       Layout
       =================================================================== */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 100px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    .live-label {
      font-size: 12px;
      color: var(--text-tertiary);
      font-weight: 500;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font-body);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-sm);
    }

    .btn-danger {
      color: var(--red);
      border-color: var(--red);
    }

    .btn-danger:hover {
      background: var(--red-bg);
    }

    .btn-accent {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn-accent:hover {
      opacity: 0.9;
    }

    /* Webhook URL bar */
    .webhook-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      background: var(--accent-light);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .webhook-bar label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .webhook-url {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 12px;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-copy-url {
      font-size: 12px;
      padding: 5px 10px;
      white-space: nowrap;
    }

    /* Main content area */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Left panel — submissions list */
    .panel-left {
      width: 380px;
      min-width: 300px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }

    .search-bar {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .search-input {
      width: 100%;
      padding: 9px 14px;
      font-size: 13px;
      font-family: var(--font-body);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input::placeholder {
      color: var(--text-tertiary);
    }

    .search-input:focus {
      border-color: var(--accent);
    }

    .submissions-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .submission-card {
      padding: 14px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.12s;
      border: 1px solid transparent;
    }

    .submission-card:hover {
      background: var(--accent-light);
    }

    .submission-card.active {
      background: var(--accent-light);
      border-color: var(--border-hover);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .card-number {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .card-time {
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
    }

    .card-preview {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.45;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .card-preview span {
      color: var(--text);
      font-weight: 500;
    }

    /* Right panel — detail view */
    .panel-right {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
      background: var(--bg);
    }

    .detail-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      color: var(--text-tertiary);
    }

    .detail-empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .detail-empty h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .detail-empty p {
      font-size: 14px;
      max-width: 320px;
    }

    .detail-header {
      margin-bottom: 28px;
    }

    .detail-id {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }

    .detail-time {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .detail-ip {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .detail-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .detail-fields {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .field-row {
      display: flex;
      background: var(--surface);
      min-height: 44px;
    }

    .field-name {
      width: 160px;
      min-width: 160px;
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      background: #fafaf8;
      display: flex;
      align-items: flex-start;
      word-break: break-all;
    }

    .field-value {
      flex: 1;
      padding: 12px 16px;
      font-size: 14px;
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 40px;
    }

    .empty-state-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .empty-state h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 14px;
      color: var(--text-secondary);
      max-width: 400px;
      margin-bottom: 20px;
    }

    .empty-state code {
      font-family: var(--font-mono);
      font-size: 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      display: block;
      margin-bottom: 8px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 18px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 1000;
    }

    .toast.visible {
      transform: translateY(0);
      opacity: 1;
    }

    /* Confirm dialog */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .confirm-dialog {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 360px;
      width: 90%;
      box-shadow: var(--shadow-lg);
    }

    .confirm-dialog h3 {
      font-size: 16px;
      margin-bottom: 8px;
    }

    .confirm-dialog p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .confirm-dialog .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    /* Scrollbar styling */
    .submissions-list::-webkit-scrollbar,
    .panel-right::-webkit-scrollbar {
      width: 6px;
    }

    .submissions-list::-webkit-scrollbar-track,
    .panel-right::-webkit-scrollbar-track {
      background: transparent;
    }

    .submissions-list::-webkit-scrollbar-thumb,
    .panel-right::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* ===================================================================
       Responsive
       =================================================================== */
    @media (max-width: 768px) {
      .main {
        flex-direction: column;
      }

      .panel-left {
        width: 100%;
        min-width: 0;
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 45vh;
      }

      .panel-right {
        padding: 24px 20px;
      }

      .webhook-bar {
        flex-wrap: wrap;
      }

      .field-name {
        width: 120px;
        min-width: 120px;
      }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="logo">Form Inbox</span>
      <span class="badge" id="countBadge">0</span>
    </div>
    <div class="header-right">
      <div class="live-dot"></div>
      <span class="live-label">Live</span>
      <button class="btn" onclick="fetchSubmissions()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        Refresh
      </button>
    </div>
  </header>

  <!-- Webhook URL bar -->
  <div class="webhook-bar">
    <label>Webhook URL</label>
    <div class="webhook-url" id="webhookUrl"></div>
    <button class="btn btn-copy-url" onclick="copyWebhookUrl()">Copy</button>
  </div>

  <!-- Main panels -->
  <div class="main" id="mainContent">
    <!-- Left panel -->
    <div class="panel-left" id="panelLeft">
      <div class="search-bar">
        <input class="search-input" type="text" placeholder="Search submissions..." id="searchInput" oninput="filterSubmissions()" />
      </div>
      <div class="submissions-list" id="submissionsList"></div>
    </div>

    <!-- Right panel -->
    <div class="panel-right" id="panelRight">
      <div class="detail-empty" id="detailEmpty">
        <div class="detail-empty-icon">&#x2709;</div>
        <h3>Select a submission</h3>
        <p>Click on a submission from the list to view its details here.</p>
      </div>
      <div id="detailContent" style="display:none"></div>
    </div>
  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script>
  // ===========================================================================
  // State
  // ===========================================================================
  let allSubmissions = [];
  let selectedId = null;
  let pollTimer = null;

  // ===========================================================================
  // Init
  // ===========================================================================
  (function init() {
    // Set webhook URL
    const base = window.location.origin;
    document.getElementById("webhookUrl").textContent = base + "/webhook";

    fetchSubmissions();

    // Auto-poll every 30 seconds
    pollTimer = setInterval(fetchSubmissions, 30000);
  })();

  // ===========================================================================
  // API
  // ===========================================================================
  async function fetchSubmissions() {
    try {
      const res = await fetch("/api/submissions");
      const data = await res.json();
      allSubmissions = data.submissions || [];
      document.getElementById("countBadge").textContent = data.total || 0;
      renderList();

      // If selected submission was deleted, clear detail
      if (selectedId && !allSubmissions.find(s => s.id === selectedId)) {
        selectedId = null;
        showEmptyDetail();
      } else if (selectedId) {
        renderDetail(allSubmissions.find(s => s.id === selectedId));
      }
    } catch (err) {
      console.error("Failed to fetch submissions:", err);
    }
  }

  async function deleteSubmission(id) {
    try {
      const res = await fetch(`/api/submissions/${id}`, { method: "DELETE" });
      if (res.ok) {
        showToast("Submission deleted");
        if (selectedId === id) {
          selectedId = null;
          showEmptyDetail();
        }
        fetchSubmissions();
      }
    } catch (err) {
      console.error("Failed to delete:", err);
    }
  }

  // ===========================================================================
  // Rendering
  // ===========================================================================

  function filterSubmissions() {
    renderList();
  }

  function renderList() {
    const listEl = document.getElementById("submissionsList");
    const query = document.getElementById("searchInput").value.toLowerCase().trim();

    // Filter
    let filtered = allSubmissions;
    if (query) {
      filtered = allSubmissions.filter(s => {
        const fieldsStr = JSON.stringify(s.fields).toLowerCase();
        return fieldsStr.includes(query) || s.id.toLowerCase().includes(query);
      });
    }

    // Empty state
    if (allSubmissions.length === 0) {
      const base = window.location.origin;
      listEl.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">&#x1F4E8;</div>
          <h2>No submissions yet</h2>
          <p>Point your Framer form to this webhook URL to start receiving submissions:</p>
          <code>${base}/webhook</code>
          <p style="font-size:12px;color:var(--text-tertiary)">In Framer: Form Settings &rarr; Action &rarr; Send to URL</p>
        </div>
      `;
      return;
    }

    if (filtered.length === 0) {
      listEl.innerHTML = `
        <div class="empty-state">
          <h2>No matches</h2>
          <p>No submissions match your search.</p>
        </div>
      `;
      return;
    }

    // Build list — number based on overall index (newest = highest number)
    const total = allSubmissions.length;
    listEl.innerHTML = filtered.map(sub => {
      const idx = total - allSubmissions.indexOf(sub);
      const preview = getPreview(sub.fields);
      const time = formatTime(sub.received_at);
      const active = sub.id === selectedId ? " active" : "";

      return `
        <div class="submission-card${active}" data-id="${sub.id}" onclick="selectSubmission('${sub.id}')">
          <div class="card-header">
            <span class="card-number">#${idx}</span>
            <span class="card-time">${time}</span>
          </div>
          <div class="card-preview">${preview}</div>
        </div>
      `;
    }).join("");
  }

  function selectSubmission(id) {
    selectedId = id;
    const sub = allSubmissions.find(s => s.id === id);
    if (sub) {
      renderDetail(sub);
      renderList(); // re-render to update active state
    }
  }

  function renderDetail(sub) {
    if (!sub) return;
    const el = document.getElementById("detailContent");
    document.getElementById("detailEmpty").style.display = "none";
    el.style.display = "block";

    const idx = allSubmissions.length - allSubmissions.indexOf(sub);
    const entries = Object.entries(sub.fields);

    el.innerHTML = `
      <div class="detail-header">
        <div class="detail-id">ID: ${sub.id}</div>
        <div class="detail-time">Submission #${idx} &mdash; ${formatTimeLong(sub.received_at)}</div>
        <div class="detail-ip">Source IP: ${sub.source_ip || "unknown"}</div>
        <div class="detail-actions">
          <button class="btn" onclick="copyJson('${sub.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy as JSON
          </button>
          <button class="btn btn-danger" onclick="confirmDelete('${sub.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            Delete
          </button>
        </div>
      </div>

      ${entries.length > 0 ? `
        <div class="detail-fields">
          ${entries.map(([key, val]) => `
            <div class="field-row">
              <div class="field-name">${escapeHtml(key)}</div>
              <div class="field-value">${escapeHtml(typeof val === "object" ? JSON.stringify(val, null, 2) : String(val))}</div>
            </div>
          `).join("")}
        </div>
      ` : '<p style="color:var(--text-tertiary)">No fields in this submission.</p>'}
    `;
  }

  function showEmptyDetail() {
    document.getElementById("detailContent").style.display = "none";
    document.getElementById("detailEmpty").style.display = "flex";
  }

  // ===========================================================================
  // Actions
  // ===========================================================================

  function copyWebhookUrl() {
    const url = document.getElementById("webhookUrl").textContent;
    navigator.clipboard.writeText(url).then(() => showToast("Webhook URL copied!"));
  }

  function copyJson(id) {
    const sub = allSubmissions.find(s => s.id === id);
    if (!sub) return;
    const json = JSON.stringify(sub.fields, null, 2);
    navigator.clipboard.writeText(json).then(() => showToast("JSON copied to clipboard!"));
  }

  function confirmDelete(id) {
    const overlay = document.createElement("div");
    overlay.className = "confirm-overlay";
    overlay.innerHTML = `
      <div class="confirm-dialog">
        <h3>Delete submission?</h3>
        <p>This action cannot be undone. The submission will be permanently removed.</p>
        <div class="actions">
          <button class="btn" id="cancelDelete">Cancel</button>
          <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    document.getElementById("cancelDelete").onclick = () => overlay.remove();
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    document.getElementById("confirmDeleteBtn").onclick = () => {
      overlay.remove();
      deleteSubmission(id);
    };
  }

  // ===========================================================================
  // Helpers
  // ===========================================================================

  function getPreview(fields) {
    const entries = Object.entries(fields);
    if (entries.length === 0) return '<span style="color:var(--text-tertiary)">Empty submission</span>';

    return entries.slice(0, 3).map(([k, v]) => {
      const val = typeof v === "object" ? JSON.stringify(v) : String(v);
      const truncated = val.length > 50 ? val.slice(0, 50) + "..." : val;
      return `<span>${escapeHtml(k)}:</span> ${escapeHtml(truncated)}`;
    }).join(" &middot; ");
  }

  function formatTime(iso) {
    const d = new Date(iso);
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const month = months[d.getMonth()];
    const day = d.getDate();
    const h = String(d.getHours()).padStart(2, "0");
    const m = String(d.getMinutes()).padStart(2, "0");
    return `${month} ${day} · ${h}:${m}`;
  }

  function formatTimeLong(iso) {
    const d = new Date(iso);
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} at ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`;
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.classList.add("visible");
    setTimeout(() => toast.classList.remove("visible"), 2500);
  }
</script>

</body>
</html>
